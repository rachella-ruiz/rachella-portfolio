  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

igin: top center;\n    width: 1280px;\n    flex-shrink: 0;\n  }\n  .frame {\n    width: 1280px;\n    background: var(--cream);\n    border-radius: 4px;\n    overflow: hidden;\n    box-shadow: 0 30px 80px -30px rgba(0,0,0,.25);\n  }\n  /* topbar */\n  .topbar {\n    background: var(--ink);\n    color: var(--paper);\n    font-size: 14px;\n    padding: 12px 56px;\n    display: flex;\n    justify-content: flex-end;\n    gap: 36px;\n    font-weight: 400;\n  }\n  .topbar span { display: inline-flex; align-items: center; gap: 10px; }\n  .topbar svg { width: 16px; height: 16px; }\n  /* nav */\n  .nav {\n    background: var(--paper);\n    padding: 16px 56px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 28px;\n  }\n  .logo { height: 56px; display: block; }\n  .nav-items {\n    display: flex;\n    align-items: center;\n    gap: 28px;\n    font-size: 15px;\n    color: var(--ink);\n    font-weight: 500;\n  }\n  .nav-items a {\n    color: inherit;\n    text-decoration: none;\n    cursor: default;\n    position: relative;\n    padding: 4px 0;\n  }\n  .nav-items .active {\n    color: var(--teal);\n    border-bottom: 1.5px solid var(--teal);\n  }\n  .search-ico {\n    width: 18px; height: 18px;\n    color: var(--ink);\n    margin: 0 4px;\n  }\n  .nav-cta { display: flex; gap: 12px; margin-left: 8px; }\n  .btn-outline, .btn-solid {\n    font-family: 'Nunito', sans-serif;\n    font-size: 14px;\n    font-weight: 600;\n    padding: 12px 22px;\n    border-radius: 4px;\n    cursor: default;\n    border: 1px solid var(--teal);\n    background: transparent;\n    color: var(--teal);\n    transition: background .15s ease, color .15s ease;\n  }\n  .btn-solid {\n    background: var(--teal);\n    color: var(--paper);\n  }\n  /* hero */\n  .hero {\n    padding: 72px 80px 32px;\n  }\n  .hero h1 {\n    font-family: 'Libre Baskerville', serif;\n    font-weight: 400;\n    font-size: 78px;\n    line-height: 1.05;\n    margin: 0 0 18px;\n    color: var(--ink);\n    letter-spacing: -.005em;\n  }\n  .hero p {\n    font-family: 'Nunito', sans-serif;\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: .16em;\n    text-transform: uppercase;\n    color: var(--gray);\n    margin: 0;\n  }\n  /* form card */\n  .card {\n    margin: 36px 80px 80px;\n    background: #e2dbc6;\n    padding: 48px 60px 56px;\n    border-radius: 2px;\n  }\n  .field {\n    position: relative;\n    background: #fff;\n    border: 1px solid #cbc3ad;\n    border-radius: 4px;\n    padding: 18px 22px;\n    display: flex;\n    align-items: center;\n    min-height: 56px;\n    transition: border-color .2s ease, box-shadow .2s ease;\n  }\n  .field.focus {\n    border-color: var(--teal);\n    box-shadow: 0 0 0 3px rgba(42,79,81,.12);\n  }\n  .field .placeholder {\n    color: #9b9789;\n    font-size: 16px;\n    font-family: 'Nunito', sans-serif;\n    position: absolute;\n    left: 22px;\n    top: 50%;\n    transform: translateY(-50%);\n    transition: opacity .15s ease;\n    pointer-events: none;\n  }\n  .field.has-value .placeholder { display: none; }\n  .field .value {\n    font-size: 16px;\n    color: var(--ink);\n    letter-spacing: .04em;\n    font-family: 'Nunito', sans-serif;\n  }\n  .caret {\n    display: inline-block;\n    width: 1.5px;\n    height: 20px;\n    background: var(--teal);\n    margin-left: 2px;\n    vertical-align: middle;\n    animation: blink 1s steps(2, start) infinite;\n  }\n  .caret.hidden { opacity: 0; }\n  @keyframes blink { 50% { opacity: 0; } }\n  /* terms row */\n  .terms {\n    margin-top: 22px;\n    display: flex;\n    align-items: flex-start;\n    gap: 12px;\n    font-size: 15px;\n    color: var(--ink);\n    font-family: 'Nunito', sans-serif;\n  }\n  .checkbox {\n    width: 18px;\n    height: 18px;\n    border: 1.5px solid var(--gray);\n    border-radius: 3px;\n    background: #fff;\n    flex-shrink: 0;\n    margin-top: 2px;\n    display: grid;\n    place-items: center;\n    transition: background .15s ease, border-color .15s ease;\n  }\n  .checkbox.hover { border-color: var(--teal); }\n  .checkbox.checked {\n    background: var(--teal);\n    border-color: var(--teal);\n  }\n  .checkbox svg {\n    width: 12px; height: 12px;\n    color: #fff;\n    stroke-dasharray: 20;\n    stroke-dashoffset: 20;\n    transition: stroke-dashoffset .25s ease .05s;\n  }\n  .checkbox.checked svg { stroke-dashoffset: 0; }\n  .terms a {\n    color: var(--teal);\n    text-decoration: underline;\n    text-underline-offset: 2px;\n    cursor: default;\n  }\n  /* legal text */\n  .legal {\n    margin-top: 20px;\n    font-size: 13.5px;\n    line-height: 1.55;\n    color: var(--ink);\n    max-width: 920px;\n    font-family: 'Nunito', sans-serif;\n    font-weight: 400;\n  }\n  .legal strong { font-weight: 700; }\n  /* button */\n  .actions { margin-top: 30px; }\n  .submit {\n    font-family: 'Nunito', sans-serif;\n    font-size: 16px;\n    font-weight: 500;\n    color: var(--paper);\n    background: var(--teal-light);\n    border: none;\n    padding: 14px 36px;\n    border-radius: 4px;\n    cursor: default;\n    transition: background .2s ease, box-shadow .2s ease;\n  }\n  .submit.hover   { background: var(--teal); }\n  .submit.pressed { background: var(--teal); box-shadow: 0 0 0 3px rgba(42,79,81,.12); }\n  /* cursor */\n  .cursor {\n    position: fixed;\n    width: 22px;\n    height: 28px;\n    pointer-events: none;\n    z-index: 1000;\n    transition: transform .9s cubic-bezier(.4,0,.2,1), opacity .3s ease;\n    transform-origin: top left;\n  }\n  .cursor .arrow { transition: transform .12s ease; }\n  .cursor.click .arrow { transform: scale(.85); }\n  .click-ring {\n    position: absolute;\n    left: 8px; top: 8px;\n    width: 0; height: 0;\n    border-radius: 50%;\n    border: 2px solid var(--teal);\n    transform: translate(-50%, -50%);\n    opacity: 0;\n  }\n  .click-ring.go { animation: ring .55s ease-out forwards; }\n  @keyframes ring {\n    0%   { width: 0;  height: 0;  opacity: .7; }\n    100% { width: 48px; height: 48px; opacity: 0; }\n  }\n  /* replay */\n  .replay {\n    position: fixed;\n    bottom: 20px;\n    right: 20px;\n    background: var(--ink);\n    color: var(--paper);\n    border: none;\n    padding: 10px 16px;\n    border-radius: 999px;\n    font-family: 'Nunito', sans-serif;\n    font-size: 13px;\n    font-weight: 500;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    opacity: .85;\n    z-index: 1001;\n  }\n  .replay:hover { opacity: 1; }\n  .replay svg { width: 14px; height: 14px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"stage\" id=\"stage\"><div class=\"frame\">\n    <div class=\"topbar\">\n      <span>\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>\n        + 34 614 21 64 40\n      <\u002Fspan>\n      <span>\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 6L2 7\"><\u002Fpath><\u002Fsvg>\n        info@legaleseu.es\n      <\u002Fspan>\n    <\u002Fdiv>\n\n    <nav class=\"nav\">\n      <img class=\"logo\" src=\"da8da037-4b13-4d67-b5b5-68d2a377b724\" alt=\"LegalES — Extranjería y Fiscalidad\">\n      <div class=\"nav-items\">\n        <a>Quiénes somos<\u002Fa>\n        <a>Servicios<\u002Fa>\n        <a class=\"active\">«Cómo va mi asilo»<\u002Fa>\n        <a>Blog<\u002Fa>\n        <svg class=\"search-ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n        <div class=\"nav-cta\">\n          <button class=\"btn-outline\">Consulta Gratuita<\u002Fbutton>\n          <button class=\"btn-solid\">Agendar cita<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <section class=\"hero\">\n      <h1>Cómo va mi asilo<\u002Fh1>\n      <p>Información sobre estado de expediente de asilo en España<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"card\" style=\"background-color: rgb(248, 247, 242)\">\n      <div class=\"field\" id=\"field\">\n        <span class=\"placeholder\" id=\"placeholder\">Ingresa tu NIE aquí con letras mayúsculas<\u002Fspan>\n        <span class=\"value\"><span id=\"typed\"><\u002Fspan><span class=\"caret hidden\" id=\"caret\"><\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n\n      <label class=\"terms\">\n        <span class=\"checkbox\" id=\"checkbox\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"4 12 10 18 20 6\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fspan>\n        <span>He leído y acepto los <a>Términos y Condiciones<\u002Fa> y la <a>Política de Privacidad<\u002Fa>.<\u002Fspan>\n      <\u002Flabel>\n\n      <p class=\"legal\">\n        <strong>RESPONSABLE:<\u002Fstrong> Legal European Union LLC. <strong>FINALIDAD PRINCIPAL:<\u002Fstrong> Consultas, Respuesta a consultas, envío de novedades. <strong>LEGITIMACIÓN:<\u002Fstrong> Consentimiento del interesado.\n        <strong>DESTINATARIOS:<\u002Fstrong> No se cederán datos a terceros, salvo autorización expresa u obligación legal.\n        <strong>DERECHOS:<\u002Fstrong> Acceder, rectificar y suprimir los datos, portabilidad de los datos, limitación u oposición a su tratamiento, transparencia y derecho a no ser objeto de decisiones automatizadas.\n      <\u002Fp>\n\n      <div class=\"actions\">\n        <button class=\"submit\" id=\"submit\">Consultar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- animated cursor -->\n  <div class=\"cursor\" id=\"cursor\" style=\"left:0;top:0;\">\n    <svg class=\"arrow\" viewBox=\"0 0 24 24\" width=\"22\" height=\"28\">\n      <path d=\"M3 2 L3 20 L8 16 L11 22 L14 21 L11 15 L18 15 Z\" fill=\"#0F201E\" stroke=\"#F8F7F2\" stroke-width=\"1.2\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fsvg>\n    <span class=\"click-ring\" id=\"ring\"><\u002Fspan>\n  <\u002Fdiv>\n\n<script>\n  (function () {\n    const DESIGN_W = 1280;\n    const PAD = 48;\n    const stage = document.getElementById('stage');\n    function fit() {\n      const avail = window.innerWidth - PAD;\n      const s = Math.min(1, avail / DESIGN_W);\n      stage.style.setProperty('--stage-scale', s);\n      stage.style.height = (stage.firstElementChild.offsetHeight * s) + 'px';\n    }\n    window.addEventListener('resize', fit);\n    window.addEventListener('load', fit);\n    fit();\n  })();\n\n  const NIE = 'Y8836049S';\n  const cursor = document.getElementById('cursor');\n  const ring = document.getElementById('ring');\n  const field = document.getElementById('field');\n  const typed = document.getElementById('typed');\n  const caret = document.getElementById('caret');\n  const checkbox = document.getElementById('checkbox');\n  const submit = document.getElementById('submit');\n\n  const wait = (ms) => new Promise(r => setTimeout(r, ms));\n\n  function moveTo(el, offsetX = null, offsetY = null) {\n    return new Promise(resolve => {\n      const r = el.getBoundingClientRect();\n      const x = r.left + (offsetX !== null ? offsetX : r.width / 2) - 4;\n      const y = r.top + (offsetY !== null ? offsetY : r.height / 2) - 4;\n      cursor.style.transform = `translate(${x}px, ${y}px)`;\n      setTimeout(resolve, 950);\n    });\n  }\n\n  function clickPulse() {\n    cursor.classList.add('click');\n    ring.classList.remove('go');\n    void ring.offsetWidth;\n    ring.classList.add('go');\n    setTimeout(() => cursor.classList.remove('click'), 200);\n  }\n\n  async function typeNIE() {\n    field.classList.add('focus', 'has-value');\n    caret.classList.remove('hidden');\n    for (let i = 0; i < NIE.length; i++) {\n      typed.textContent += NIE[i];\n      await wait(130 + Math.random() * 110);\n    }\n    await wait(400);\n    caret.classList.add('hidden');\n    field.classList.remove('focus');\n  }\n\n  async function run() {\n    typed.textContent = '';\n    field.classList.remove('focus', 'has-value');\n    checkbox.classList.remove('hover', 'checked');\n    submit.classList.remove('hover', 'pressed');\n    caret.classList.add('hidden');\n\n    const startX = window.innerWidth * 0.25;\n    const startY = window.innerHeight * 0.85;\n    cursor.style.transition = 'none';\n    cursor.style.transform = `translate(${startX}px, ${startY}px)`;\n    await wait(50);\n    cursor.style.transition = '';\n\n    await wait(500);\n\n    // 1) click input\n    await moveTo(field, 80, field.getBoundingClientRect().height / 2);\n    clickPulse();\n    await wait(250);\n\n    // 2) type NIE\n    await typeNIE();\n    await wait(400);\n\n    // 3) check terms\n    await moveTo(checkbox, checkbox.getBoundingClientRect().width / 2, checkbox.getBoundingClientRect().height / 2);\n    checkbox.classList.add('hover');\n    await wait(180);\n    clickPulse();\n    checkbox.classList.add('checked');\n    await wait(600);\n    checkbox.classList.remove('hover');\n\n    // 4) hover + press Consultar (same rhythm as input & checkbox)\n    await moveTo(submit, submit.getBoundingClientRect().width / 2, submit.getBoundingClientRect().height / 2);\n    submit.classList.add('hover');\n    await wait(250);\n    clickPulse();\n    submit.classList.add('pressed');\n    await wait(600);\n    submit.classList.remove('pressed');\n    submit.classList.remove('hover');\n    await wait(700);\n  }\n\n  async function loop() {\n    while (true) {\n      await run();\n      await wait(1200);\n    }\n  }\n  window.addEventListener('load', () => setTimeout(loop, 400));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
